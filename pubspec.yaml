name: medisync_app
description: MediSync 360 - Centralized Healthcare Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.8
  flutter_dotenv: ^6.0.0
  google_mlkit_text_recognition: ^0.13.1

  # Networking
  http: ^1.2.1
  dio: ^5.9.2

  # Local storage
  shared_preferences: ^2.2.3

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_inappwebview: ^6.1.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  image_picker: ^1.2.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4


  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/medisync360_splash.jpeg


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/medisync360_splash.jpeg
  android: true
  ios: true
  web: false

  android_12:
    image: assets/medisync360_splash.jpeg
    icon_background_color: "#FFFFFF"

  android_gravity: center
  ios_content_mode: center



flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/medisync360_splash.jpeg"
  min_sdk_android: 21