name: medisync_app
description: MediSync 360 - Centralized Healthcare Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.8

  # Networking
  http: ^1.2.1
  dio: ^5.9.2

  # Local storage
  shared_preferences: ^2.2.3

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_inappwebview: ^6.1.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  image_picker: ^1.2.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true